# Server
server.port=8080

# Database — override these via environment variables in production
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:login}
spring.datasource.username=${DB_USER:kumananm}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT — set JWT_SECRET in your environment (min 32 chars for HS256)
jwt.secret=${JWT_SECRET:changeme-replace-this-with-a-long-secret-in-prod}
# 24 hours in milliseconds
jwt.expiration=86400000

# Gemini AI
gemini.api.key=${GEMINI_API_KEY:AIzaSyCtCDfwy1Bs2DUVRAPwLiIkS5O2A-cHd1M}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# CORS — comma-separated list of allowed origins
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never